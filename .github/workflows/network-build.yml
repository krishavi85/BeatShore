name: Network Build
on:
  push:
    branches:
      - main
      - network-ci
  workflow_dispatch:

jobs:
  install-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify npm registry
        run: npm ping --registry=https://registry.npmjs.org
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Build BeatShore
        run: npm run build
